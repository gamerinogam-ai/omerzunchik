<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    :root {
      --bg-dark: #0a0005;
      --accent-red: #c2185b;
      --neon-magenta: #ff1493;
      --gold: #b8860b;
      --text-light: #f5f0e1;
      --text-muted: #d0c0b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Hero */
    .hero {
      height: 100vh;
      min-height: 800px;
      background: url('/main.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,0,5,0.75), rgba(15,0,5,0.9));
      z-index: 1;
    }

    .logo-container { position: relative; z-index: 2; }
    .logo-img {
      max-width: 420px;
      height: auto;
      filter: drop-shadow(0 0 25px rgba(184,134,11,0.7));
    }

    .tagline {
      font-size: 1.35rem;
      font-style: italic;
      color: var(--text-muted);
      margin: 2rem 0 3rem;
      max-width: 620px;
      line-height: 1.4;
    }

    .cta {
      background: linear-gradient(135deg, var(--accent-red), #8b0000);
      color: white;
      font-size: 1.35rem;
      font-weight: bold;
      padding: 1.1rem 3rem;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px rgba(194,24,91,0.6);
      transition: all 0.3s;
    }

    .cta:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 50px rgba(194,24,91,0.9);
    }

    /* Большая фотография main1.jpg — исправленный размер */
    .main-photo {
      width: 100%;
      margin: 0;
    }

    .main-photo img {
      width: 100%;
      height: auto;
      max-height: 75vh;           /* ← Главное ограничение высоты */
      display: block;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .slogan {
      font-size: 2.6rem;
      font-weight: 900;
      font-style: italic;
      color: var(--neon-magenta);
      text-shadow: 0 0 25px var(--neon-magenta), 0 0 45px #c2185b;
