<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omerzunchik • Private Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0005;
      --accent-red: #c2185b;
      --neon-magenta: #ff1493;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-dark);
      color: #f5f0e1;
      font-family: 'Segoe UI', sans-serif;
    }

    .hero {
      height: 100vh;
      background: url('/main.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,0,5,0.75), rgba(15,0,5,0.92));
    }

    .logo-container {
      position: absolute;
      top: 40px;
      left: 40px;
      z-index: 3;
    }

    .logo-img {
      max-width: 280px;
      height: auto;
    }

    .tagline {
      font-family: 'Great Vibes', cursive;
      font-size: 2.1rem;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 35px rgba(194,24,91,0.7);
      margin: 80px 0 3rem;
      max-width: 720px;
      line-height: 1.3;
      z-index: 2;
    }

    .cta {
      background: linear-gradient(135deg, var(--accent-red), #8b0000);
      color: white;
      font-size: 1.35rem;
      font-weight: bold;
      padding: 1.2rem 3rem;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px rgba(194,24,91,0.7);
      transition: all 0.3s;
      z-index: 2;
    }

    .cta:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 50px rgba(194,24,91,0.9);
    }

    @media (max-width: 768px) {
      .logo-img { max-width: 220px; }
      .tagline { font-size: 1.7rem; margin: 60px 0 2rem; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="logo-container">
      <img src="/logo.jpg" alt="Omerzunchik Logo" class="logo-img">
    </div>
    
    <p class="tagline">Private club for those who are not afraid of their desires<br>Invitation only • Full discretion • 21+</p>
    
    <a href="apply.html" class="cta">APPLY FOR MEMBERSHIP →</a>
  </section>

</body>
</html>
