<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omerzunchik • Private Club</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0005;
      color: #f5f0e1;
      font-family: 'Segoe UI', sans-serif;
    }

    .hero {
      height: 100vh;
      background: url('/main.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,0,5,0.8), rgba(15,0,5,0.95));
    }

    .logo-img {
      max-width: 400px;
      height: auto;
      z-index: 2;
      filter: drop-shadow(0 0 20px #b8860b);
    }

    .tagline {
      font-size: 1.3rem;
      font-style: italic;
      margin: 2rem 0 3rem;
      z-index: 2;
    }

    .cta {
      background: linear-gradient(#c2185b, #8b0000);
      color: white;
      padding: 1rem 3rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      z-index: 2;
    }

    .main-photo img {
      width: 100%;
      height: auto;
      max-height: 70vh;
      display: block;
    }

    .slogan {
      font-size: 2.5rem;
      font-style: italic;
      color: #ff1493;
      text-align: center;
      margin: 2rem 0 4rem;
      text-shadow: 0 0 20px #ff1493;
    }
  </style>
</head>
<body>

  <section class="hero">
    <img src="/logo.jpg" alt="Omerzunchik" class="logo-img">
    <p class="tagline">Private club for those who are not afraid of their desires<br>Invitation only • Full discretion • 21+</p>
    <a href="https://t.me/omerzunchik_private" class="cta" target="_blank">APPLY FOR MEMBERSHIP →</a>
  </section>

  <section class="main-photo">
    <img src="/main1.jpg" alt="Omerzunchik Interior">
  </section>

  <div class="slogan">Why are you gay</div>

</body>
</html>
