<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omerzunchik • Apply</title>
  <style>
    body {
      margin: 0;
      background: #0a0005;
      color: #f5f0e1;
      font-family: 'Segoe UI', sans-serif;
    }

    .full-photo {
      width: 100%;
      height: 100vh;
    }

    .full-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .slogan {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.2rem;
      font-weight: 900;
      font-style: italic;
      color: #ff1493;
      text-shadow: 0 0 30px #ff1493, 0 0 50px #c2185b;
      text-align: center;
      animation: pulse 2.5s infinite;
      z-index: 2;
      white-space: nowrap;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="full-photo">
    <img src="/main1.jpg" alt="Omerzunchik Interior">
    <div class="slogan">Why are you gay</div>
  </div>

</body>
</html>
