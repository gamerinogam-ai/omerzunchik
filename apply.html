<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omerzunchik • Apply</title>
  <style>
    body {
      margin: 0;
      background: #0a0005;
      font-family: 'Segoe UI', sans-serif;
    }

    .content {
      max-width: 700px;
      margin: 40px auto;
      text-align: center;
      padding: 20px;
    }

    .main-photo img {
      width: 100%;
      max-width: 350px;        /* сильно уменьшено (в 4 раза) */
      height: auto;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .slogan {
      font-size: 2.8rem;
      font-weight: 900;
      font-style: italic;
      color: #ff1493;
      text-shadow: 0 0 30px #ff1493, 0 0 50px #c2185b;
      margin: 2.5rem 0 3rem;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="main-photo">
      <img src="/main1.jpg" alt="Omerzunchik Interior">
    </div>
    <div class="slogan">Why are you gay</div>
  </div>

</body>
</html>
